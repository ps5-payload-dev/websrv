name: Mari0

on:
  push:
    paths:
      - 'homebrew/Mari0/**'
    tags:
      - '*'
  pull_request:
    paths:
      - 'homebrew/Mari0/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install bash clang-18 lld-18
          sudo apt install build-essential

      - name: Install toolchain
        run: |
          wget https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz
          sudo tar xf ps5-payload-dev.tar.gz -C /

      - name: Build
        run: |
          PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk ./homebrew/Mari0/build.sh

      - name: Zip build output
        run: |
          cd homebrew
          zip -r ../Mari0.zip Mari0

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mari0
          path: Mari0.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Mari0
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          files: Mari0.zip

